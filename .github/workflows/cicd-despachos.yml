name: CI/CD Parfum - Despachos

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend-despachos/**"
      - ".github/workflows/cicd-despachos.yml"

jobs:
  build-push-deploy-despachos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagen Despachos y push a ECR
        run: |
          cd backend-despachos
          docker build -t parfum-despachos .
          docker tag parfum-despachos:latest ${{ secrets.ECR_REPO_URL_DESPACHOS }}:latest
          docker push ${{ secrets.ECR_REPO_URL_DESPACHOS }}:latest

      - name: Desplegar Despachos vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar parfum-despachos desde ECR" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_DESPACHOS }}:latest",
              "docker stop parfum-despachos || true",
              "docker rm parfum-despachos || true",
              "docker run -d --name parfum-despachos -p 8081:8081 -e DB_ENDPOINT=10.0.157.155 -e DB_PORT=3306 -e DB_NAME=perfumeria_db -e DB_USERNAME=alumno -e DB_PASSWORD=alumno123 ${{ secrets.ECR_REPO_URL_DESPACHOS }}:latest"
            ]}' \
            --output text
