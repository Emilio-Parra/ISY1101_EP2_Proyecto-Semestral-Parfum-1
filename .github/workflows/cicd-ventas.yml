name: CI/CD Parfum - Ventas

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend-ventas/**"
      - ".github/workflows/cicd-ventas.yml"

jobs:
  build-push-deploy-ventas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagen Ventas y push a ECR
        run: |
          cd backend-ventas
          docker build -t parfum-ventas .
          docker tag parfum-ventas:latest ${{ secrets.ECR_REPO_URL_VENTAS }}:latest
          docker push ${{ secrets.ECR_REPO_URL_VENTAS }}:latest

      - name: Desplegar Ventas vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar parfum-ventas desde ECR" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_VENTAS }}:latest",
              "docker stop parfum-ventas || true",
              "docker rm parfum-ventas || true",
              "docker run -d --name parfum-ventas -p 8080:8080 -e DB_ENDPOINT=10.0.143.206 -e DB_PORT=3306 -e DB_NAME=perfumeria_db -e DB_USERNAME=alumno -e DB_PASSWORD=alumno123 ${{ secrets.ECR_REPO_URL_VENTAS }}:latest"
            ]}' \
            --output text
