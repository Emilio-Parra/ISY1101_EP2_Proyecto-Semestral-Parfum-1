name: CI/CD Parfum - DB

on:
  push:
    branches: [ "main" ]
    paths:
      - "db/**"
      - ".github/workflows/cicd-db.yml"

jobs:
  build-push-deploy-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagen DB y push a ECR
        run: |
          cd db
          docker build -t parfum-db .
          docker tag parfum-db:latest ${{ secrets.ECR_REPO_URL_DB }}:latest
          docker push ${{ secrets.ECR_REPO_URL_DB }}:latest

      - name: Desplegar DB vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar parfum-db desde ECR" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_DB }}:latest",
              "docker stop parfum-db || true",
              "docker rm parfum-db || true",
              "docker run -d --name parfum-db -p 3306:3306 -v perfumeria-dbdata:/var/lib/mysql ${{ secrets.ECR_REPO_URL_DB }}:latest"
            ]}' \
            --output text
